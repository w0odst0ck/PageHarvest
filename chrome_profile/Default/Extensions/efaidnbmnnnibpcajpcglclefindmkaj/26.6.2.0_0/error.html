<html>
<head>
    <meta charset="UTF-8">
    <title class="translate" id="conversionErrorDocumentTitle"></title>
    <link href="../../css/core.css" rel="stylesheet" />
    <script src="../../../libs/jquery-3.1.1.min.js"></script>
    <link href="../../css/conversion-error.css" type="text/css" rel="stylesheet" />
    <script type="module" src="./conversion-error.js"></script>
</head>
<body>
    <div class="error-container">
        <img id="conversion-error-icon" src="../../images/DC_FileError_160.svg" alt="Conversion error icon" />
        <div class="error-content">
            <h1 class="error-heading translate" id="conversionErrorTitle"></h1>
            <p class="error-description translate" id="conversionErrorDescription"></p>
            <div class="error-buttons">
                <button class="btn-secondary" id="goToAcrobatBtn">
                    <span class="translate" id="conversionErrorGoToAcrobat"></span>
                </button>
                <button class="btn-primary" id="reportErrorBtn">
                    <span class="translate" id="conversionErrorReportError"></span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
