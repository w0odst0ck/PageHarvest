# PageHarvest 构建流水线
# 在 GitHub 上创建 Release 时自动构建 Windows/Linux 可执行文件
# 也可以手动触发: Actions → Build → Run workflow

name: Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flask openpyxl beautifulsoup4 pyinstaller

      - name: Build .exe
        run: |
          pyinstaller build.spec

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PageHarvest.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flask openpyxl beautifulsoup4 pyinstaller

      - name: Build binary
        run: |
          pyinstaller build.spec

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PageHarvest
